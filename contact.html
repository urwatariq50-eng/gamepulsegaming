<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Contact GamePulse</title>
<meta name="description" content="Get in touch with the GamePulse team, or follow us on social media for the latest gaming updates." />
<link rel="canonical" href="https://www.gamepulse.example/pages/contact.html" />
<link rel="stylesheet" href="../css/tokens.css" />
<link rel="stylesheet" href="../css/layout.css" />
</head>
<body>

<header class="site-header">
  <div class="container">
    <a href="../index.html" class="brand">
      <span class="brand-mark" aria-hidden="true"></span>
      <span>GamePulse<small>Your pulse on gaming</small></span>
    </a>
    <nav class="main-nav" aria-label="Primary">
      <a href="../index.html">Home</a>
      <a href="games.html">Games</a>
      <a href="news.html">News</a>
      <a href="reviews.html">Reviews</a>
      <a href="about.html">About</a>
      <a href="contact.html" aria-current="page">Contact</a>
    </nav>
    <div class="header-actions">
      <a class="icon-btn" data-instagram-link href="#" target="_blank" rel="noopener noreferrer" aria-label="Follow GamePulse on Instagram">IG</a>
      <button class="icon-btn" data-theme-toggle aria-label="Toggle dark and light mode">◐</button>
    </div>
  </div>
</header>

<main id="main" class="container" style="padding-block: 3rem 4rem; max-width: 640px;">
  <span class="eyebrow">Get in touch</span>
  <h1 style="font-size: var(--step-3); margin: 0.3em 0 0.6em;">Contact GamePulse</h1>
  <p style="color: var(--c-text-muted);">Questions, tips, or partnership inquiries — reach out below, or find us on social.</p>

  <form class="panel" style="padding: 2rem; margin-top: 2rem; display:grid; gap:1.1rem;" onsubmit="return false;">
    <label>
      <span class="mono" style="font-size: var(--step--1); color: var(--c-text-muted); display:block; margin-bottom: 0.4em;">Name</span>
      <input type="text" required style="width:100%; padding:0.75em; background: var(--c-bg); border:1px solid var(--c-panel-border); color: var(--c-text); border-radius: var(--radius);" />
    </label>
    <label>
      <span class="mono" style="font-size: var(--step--1); color: var(--c-text-muted); display:block; margin-bottom: 0.4em;">Email</span>
      <input type="email" required style="width:100%; padding:0.75em; background: var(--c-bg); border:1px solid var(--c-panel-border); color: var(--c-text); border-radius: var(--radius);" />
    </label>
    <label>
      <span class="mono" style="font-size: var(--step--1); color: var(--c-text-muted); display:block; margin-bottom: 0.4em;">Message</span>
      <textarea rows="5" required style="width:100%; padding:0.75em; background: var(--c-bg); border:1px solid var(--c-panel-border); color: var(--c-text); border-radius: var(--radius); font-family: inherit;"></textarea>
    </label>
    <button type="submit" class="btn btn-coral" style="justify-self:start;">Send Message</button>
  </form>

  <div class="panel" style="padding: 2rem; margin-top: 2rem;">
    <span class="eyebrow">Or find us on social</span>
    <h2 style="margin: 0.4em 0 0.6em; font-size: var(--step-1); text-transform:none;">Follow GamePulse Gaming</h2>
    <div class="social-follow" data-social-follow></div>
  </div>
</main>

<footer class="site-footer">
  <div class="container footer-bottom">
    <span>© 2026 GamePulse.</span>
  </div>
</footer>

<script src="../js/site-config.js"></script>
<script src="../js/main.js"></script>
</body>
</html>
